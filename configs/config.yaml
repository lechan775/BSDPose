project:
  name: badminton_pose_detect
  seed: 42
  output_dir: results
  logs_dir: logs

data:
  bsd_root: data/bsd
  train_json: data/bsd/train.json
  val_json: data/bsd/val.json
  test_json: data/bsd/test.json
  coco_pose_yaml: coco-pose.yaml
  bsd_pose_yaml: data/bsd/bsd-pose.yaml
  num_classes: 6
  stroke_names:
    - forehand_clear
    - backhand_clear
    - forehand_smash
    - backhand_smash
    - forehand_net_lift
    - backhand_net_lift

pose:
  base_weights: yolov8n-pose.pt
  image_size: 640
  batch_size: 16
  epochs: 300
  optimizer: SGD
  lr0: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  cos_lr: true
  attention_layers: [15, 18, 21]
  cbam_reduction_ratio: 16
  loss_weights:
    cls: 7.5
    box: 7.5
    kpt: 12.0

features:
  window_size: 16
  stride: 8
  frame_feature_dim: 15
  aggregated_feature_dim: 62

classifier:
  epochs: 200
  batch_size: 64
  lr: 0.001
  dropout: 0.3
  early_stopping_patience: 30
  reduce_lr_patience: 10
  regression_weight: 0.5

experiments:
  pose_variants:
    - baseline
    - se
    - cbam
  classifier_variants:
    openpose_lstm:
      model_kind: lstm
      return_sequence: true
      description: OpenPose + LSTM baseline; use supplied OpenPose keypoints if available.
    yolov8_lstm:
      model_kind: lstm
      return_sequence: true
      description: YOLOv8-Pose + LSTM baseline.
    cbam_lstm:
      model_kind: lstm
      return_sequence: true
      description: Improved YOLOv8-Pose + CBAM keypoints with LSTM; used for CBAM-only ablation.
    yolov8_kinematic_mlp:
      model_kind: mlp
      return_sequence: false
      description: YOLOv8-Pose + kinematic features + MLP.
    yolov8_kinematic_multitask:
      model_kind: multi_task
      return_sequence: false
      description: YOLOv8-Pose + kinematic features + multi-task head.
    cbam_kinematic_multitask:
      model_kind: multi_task
      return_sequence: false
      description: Improved YOLOv8 + kinematic features + multi-task head.
